services:
  postgres:
    image: postgres:16-alpine
    container_name: fusiku-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fusiku
      POSTGRES_PASSWORD: fusiku_secret
      POSTGRES_DB: fusiku_erp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fusiku -d fusiku_erp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fusiku-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fusiku-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://fusiku:fusiku_secret@postgres:5432/fusiku_erp
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      JWT_EXPIRES: ${JWT_EXPIRES:-7d}
    volumes:
      - backend_uploads:/app/uploads
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fusiku-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
